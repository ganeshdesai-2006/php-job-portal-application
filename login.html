<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #888;
        }
        button {

            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {

        }

<body>

<div class="container">
<center>
    <h2>Login</h2>

    <form action="login.php" method="post">

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
