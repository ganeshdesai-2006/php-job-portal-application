<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <style>
        body {
 background: #f2f2f2; 
font-family: Arial;
 }
        .container {
 width: 350px;
 margin: 60px auto;
 background: white;
 padding: 25px; 
border-radius: 10px; 
box-shadow: 0 0 10px #ccc;
 }
        input
 { width: 100%; 
padding: 10px; 
margin: 8px 0; 
border-radius: 5px; 
border: 1px solid #888; 
}
        button {
 width: 100%; 
padding: 10px; 
background: #4caf50; 
color: white; 
border: none;
 border-radius: 5px;
 }
        button:hover { 
background: #3d8f41;
 }
        .link { 
text-align: center; 
margin-top: 10px;
 }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>


    <form action="signup.php" method="post">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        
        <input type="password" name="password" placeholder="Password" required>
      
       
        <button type="submit">Signup</button>
    </form>

    <div class="link">
        <a href="login.html">Already have an account? Login</a>
    </div>
</div>

</body>
</html>
